<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Edgeless Sidebar</title>
  <link rel="stylesheet" href="panel.css">
  <link rel="stylesheet" href="sidebar.css">
</head>

<body>

  <div class="edgeless-main-panel">

    <!-- Resize Handle -->
    <div id="resizeHandle"></div>

    <!-- App Tower -->
    <div class="edgeless-app-tower" id="appTower">
      <button class="edgeless-pin-btn" id="pinBtn">＋</button>
    </div>

    <!-- URL Bar -->
    <div class="edgeless-url-bar">
      <button class="back-btn" id="backBtn">◀</button>
      <button class="reload-btn" id="reloadBtn">⟳</button>
      <input id="urlBar" placeholder="Enter URL…" autocomplete="off">
      <button id="goBtn">Go</button>
      <button id="toggleModeBtn">⇆</button>
    </div>

    <!-- Widget Deck -->
    <div class="edgeless-widget-deck">
      <div class="widget-tabs">
        <button class="widget-tab active" data-widget="notes">📝 Notes</button>
        <button class="widget-tab" data-widget="calculator">🧮 Calculator</button>
      </div>

      <div class="widget-content">
        <textarea id="scratchpad" class="edgeless-scratchpad"></textarea>

        <div id="calculator" class="edgeless-calculator" style="display:none;">
          <input id="calcDisplay" readonly value="0">
          <div class="calc-grid">
            <button class="calc-btn clear" data-value="C">C</button>
            <button class="calc-btn" data-value="(">(</button>
            <button class="calc-btn" data-value=")">)</button>
            <button class="calc-btn operator" data-value="/">÷</button>

            <button class="calc-btn" data-value="7">7</button>
            <button class="calc-btn" data-value="8">8</button>
            <button class="calc-btn" data-value="9">9</button>
            <button class="calc-btn operator" data-value="*">×</button>

            <button class="calc-btn" data-value="4">4</button>
            <button class="calc-btn" data-value="5">5</button>
            <button class="calc-btn" data-value="6">6</button>
            <button class="calc-btn operator" data-value="-">−</button>

            <button class="calc-btn" data-value="1">1</button>
            <button class="calc-btn" data-value="2">2</button>
            <button class="calc-btn" data-value="3">3</button>
            <button class="calc-btn operator" data-value="+">+</button>

            <button class="calc-btn span-two" data-value="0">0</button>
            <button class="calc-btn" data-value=".">.</button>
            <button class="calc-btn equals" data-value="=">=</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Viewport -->
    <div class="edgeless-viewport-container">
      <iframe id="viewport" class="edgeless-viewport"></iframe>
    </div>

  </div>

  <script src="panel.js"></script>
</body>
</html>
